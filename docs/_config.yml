# ==============================
# 基本配置
# ==============================
title: Liu Ke 的技术博客
tagline: 编程、技术与生活
description: >- 
  LiuKe的个人技术博客，专注于分享Web开发、人工智能
  和软件工程的知识与经验。
url: 'https://liuke96.cn'
baseurl: ''
lang: zh-CN

# ==============================
# 作者信息
# ==============================
author:
  name: Liu Ke
  email: your-email@example.com
  github: LiuKeFromChina

# ==============================
# GitHub Pages特定设置
# ==============================
github: [metadata]
remote_theme: cotes2020/jekyll-theme-chirpy

# ==============================
# 主题设置
# ==============================
theme_mode: light  # "light" (default), "dark" or "auto"
avatar: '/assets/img/avatar.jpg'
toc: true

# ==============================
# 文章设置
# ==============================
timezone: Asia/Shanghai
future: true
permalink: /:year/:month/:day/:title/

# ==============================
# 评论系统设置
# ==============================
comments:
  active: 'utterances'  # 可选: 'disqus', 'utterances', 'giscus'
  utterances:
    repo: LiuKeFromChina/blog-comments
    issue_term: pathname
    label: comment
    theme: github-light

# ==============================
# 分页设置
# ==============================
paginate: 10
paginate_path: /page:num/

# ==============================
# 插件设置
# ==============================
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-feed

# ==============================
# 排除文件
# ==============================
exclude:
  - '*.gem'
  - '.git*'
  - '.travis.yml'
  - '.jekyll-cache'
  - Gemfile
  - Gemfile.lock
  - README.md
  - LICENSE